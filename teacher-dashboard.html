<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVCC - Teacher Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 0;
        }
        /* Navbar */
        .navbar {
            background: #1e293b;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #38bdf8;
        }
        .nav-brand {
            font-size: 20px;
            font-weight: bold;
            color: #38bdf8;
        }
        .nav-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        
        /* Dashboard Content */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }
        .welcome-text {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .subject-badge {
            display: inline-block;
            background: #38bdf8;
            color: #0f172a;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 40px;
        }

        /* Action Cards */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: #38bdf8;
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2);
        }
        .card i {
            font-size: 40px;
            color: #38bdf8;
            margin-bottom: 15px;
        }
        .card h3 {
            margin: 0 0 10px 0;
        }
        .card p {
            color: #94a3b8;
            font-size: 14px;
            margin: 0;
        }

        /* Modal (Popup Forms) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 450px; 
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #cbd5e1;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-row {
            display: flex;
            gap: 15px;
        }
        .form-row .form-group {
            flex: 1;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #cbd5e1;
            font-weight: bold;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid rgba(255,255,255,0.2);
            background: #0f172a;
            color: white;
            box-sizing: border-box;
            color-scheme: dark; 
        }
        .form-group textarea {
            font-family: monospace; /* Code jaisa feel dene ke liye */
            font-size: 13px;
            color: #34d399; /* Green color code ke liye */
        }
        .submit-btn {
            width: 100%;
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="nav-brand"><i class="fa-solid fa-graduation-cap"></i> GVCC Faculty</div>
        <div class="nav-profile">
            <span id="displayTeacherName">Loading...</span>
            <button class="logout-btn" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <h1 class="welcome-text">Welcome, <span id="welcomeName">Sir/Madam</span></h1>
        <div class="subject-badge" id="subjectBadge">Subject</div>

        <div class="cards-grid">
            <div class="card" id="openNoticeModal">
                <i class="fa-solid fa-bullhorn"></i>
                <h3>Send Notice</h3>
                <p>Broadcast messages to students instantly</p>
            </div>

            <div class="card" id="openTestModal">
                <i class="fa-solid fa-microchip"></i>
                <h3>Publish AI Test</h3>
                <p>Paste AI generated code to create test</p>
            </div>

            <div class="card" onclick="window.location.href='view.html'">
                <i class="fa-solid fa-video"></i>
                <h3>View Proctoring</h3>
                <p>Check CBT results and live tracking</p>
            </div>
        </div>
    </div>

    <!-- Notice Modal -->
    <div class="modal" id="noticeModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModals()">&times;</span>
            <h2>Send Notice</h2>
            <div class="form-group">
                <label>Select Class</label>
                <select id="noticeClass">
                    <option value="All">All Classes</option>
                    <option value="Class 8">Class 8</option>
                    <option value="Class 9">Class 9</option>
                    <option value="Class 10">Class 10</option>
                </select>
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea id="noticeMessage" rows="4" placeholder="Type your message here..."></textarea>
            </div>
            <button class="submit-btn" id="sendNoticeBtn">Send Notice</button>
        </div>
    </div>

    <!-- Test Modal (UPDATED WITH AI CODE SYSTEM) -->
    <div class="modal" id="testModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModals()">&times;</span>
            <h2>Publish AI Test</h2>
            <div class="form-group">
                <label>Select Class</label>
                <select id="testClass">
                    <option value="Class 8">Class 8</option>
                    <option value="Class 9">Class 9</option>
                    <option value="Class 10">Class 10</option>
                </select>
            </div>
            <div class="form-group">
                <label>Test Name / Topic</label>
                <input type="text" id="testName" placeholder="e.g., History Chapter 1 MCQ">
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Start Date</label>
                    <input type="date" id="testDate">
                </div>
                <div class="form-group">
                    <label>Start Time</label>
                    <input type="time" id="testTime">
                </div>
            </div>

            <!-- Naya AI Code Box -->
            <div class="form-group">
                <label>Paste AI Test Code (JSON)</label>
                <textarea id="testCode" rows="5" placeholder='[
  {"question": "Bharat ki rajdhani?", "options": ["Delhi", "Mumbai", "Patna"], "answer": "Delhi"}
]'></textarea>
            </div>
            <button class="submit-btn" id="sendTestBtn"><i class="fa-solid fa-rocket"></i> Publish Smart Test</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

        // Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyBJX_dyLK80p2rNqSVvGY67TpWV7e_UdPI",
            authDomain: "gvcc-database.firebaseapp.com",
            projectId: "gvcc-database",
            storageBucket: "gvcc-database.firebasestorage.app",
            messagingSenderId: "1063216875940",
            appId: "1:1063216875940:web:a4ee2f39b01896b44c5931"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Security Check
        const teacherId = sessionStorage.getItem("loggedTeacherId");
        const teacherName = sessionStorage.getItem("loggedTeacherName") || "Unknown Teacher";
        const teacherSubject = sessionStorage.getItem("loggedTeacherSubject") || "General";

        if (!teacherId) {
            window.location.href = "teacher-login.html";
        } else {
            document.getElementById("displayTeacherName").innerText = teacherName;
            document.getElementById("welcomeName").innerText = teacherName;
            document.getElementById("subjectBadge").innerText = teacherSubject + " Department";
        }

        // Logout System
        document.getElementById("logoutBtn").addEventListener("click", () => {
            sessionStorage.clear();
            window.location.href = "teacher-login.html";
        });

        // Modals Open/Close Logic
        window.closeModals = function() {
            document.getElementById("noticeModal").style.display = "none";
            document.getElementById("testModal").style.display = "none";
        }
        document.getElementById("openNoticeModal").addEventListener("click", () => {
            document.getElementById("noticeModal").style.display = "flex";
        });
        document.getElementById("openTestModal").addEventListener("click", () => {
            document.getElementById("testModal").style.display = "flex";
        });

        // Send Notice
        document.getElementById("sendNoticeBtn").addEventListener("click", async () => {
            const targetClass = document.getElementById("noticeClass").value;
            const message = document.getElementById("noticeMessage").value.trim();
            const btn = document.getElementById("sendNoticeBtn");

            if (!message) { alert("Please type a message!"); return; }

            btn.innerText = "Sending...";
            try {
                await addDoc(collection(db, "notices"), {
                    teacherName: teacherName,
                    subject: teacherSubject,
                    targetClass: targetClass,
                    message: message,
                    timestamp: serverTimestamp()
                });
                alert("Notice sent successfully!");
                document.getElementById("noticeMessage").value = "";
                closeModals();
            } catch (error) {
                console.error("Error sending notice:", error);
                alert("Failed to send notice.");
            }
            btn.innerText = "Send Notice";
        });

        // Publish Smart AI Test
        document.getElementById("sendTestBtn").addEventListener("click", async () => {
            const targetClass = document.getElementById("testClass").value;
            const testName = document.getElementById("testName").value.trim();
            const testDate = document.getElementById("testDate").value; 
            const testTime = document.getElementById("testTime").value; 
            const testCode = document.getElementById("testCode").value.trim();
            const btn = document.getElementById("sendTestBtn");

            if (!testName || !testDate || !testTime || !testCode) { 
                alert("Please fill all details and paste the AI Code!"); 
                return; 
            }

            // 🚀 SMART CHECK: Verify if the pasted text is valid JSON
            try {
                JSON.parse(testCode);
            } catch (error) {
                alert("⚠️ Galat Code! Please check karein ki aapne AI se sahi code copy kiya hai. Isme sirf brackets aur data hona chahiye.");
                return;
            }

            btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Publishing...";
            try {
                await addDoc(collection(db, "active_tests"), {
                    teacherName: teacherName,
                    subject: teacherSubject,
                    targetClass: targetClass,
                    testName: testName,
                    testDate: testDate, 
                    testTime: testTime, 
                    testCode: testCode, // Yahan ab "Link" ki jagah seedha Code database me jayega!
                    timestamp: serverTimestamp()
                });
                alert("🚀 Smart Test Published Successfully!");
                document.getElementById("testName").value = "";
                document.getElementById("testDate").value = "";
                document.getElementById("testTime").value = "";
                document.getElementById("testCode").value = "";
                closeModals();
            } catch (error) {
                console.error("Error publishing test:", error);
                alert("Failed to publish test.");
            }
            btn.innerHTML = "<i class='fa-solid fa-rocket'></i> Publish Smart Test";
        });
    </script>
</body>
</html>
