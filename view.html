<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVCC - Proctoring & Results Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
        }
        .admin-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
        }
        .admin-header h1 { color: #38bdf8; margin: 0 0 10px 0; font-size: 24px; }
        
        .stats-badge {
            display: inline-block;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid #10b981;
            color: #34d399;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        .control-box {
            max-width: 600px;
            margin: 0 auto 30px auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(255,255,255,0.02);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .select-style, .search-box input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(15, 23, 42, 0.8);
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        .select-style:focus, .search-box input:focus { outline: none; border-color: #38bdf8; }
        
        .search-box { display: flex; gap: 10px; }
        
        .btn-search {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: 0.3s;
            white-space: nowrap;
        }
        .btn-search:hover { background: #0284c7; color: white; }
        
        .btn-scoreboard {
            background: #10b981;
            color: #0f172a;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-scoreboard:hover { background: #059669; color: white; }

        /* 🏆 Scoreboard Table Styling */
        .scoreboard-container {
            max-width: 900px;
            margin: 0 auto 30px auto;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 12px;
            overflow: hidden;
            display: none; 
            border: 1px solid rgba(255,255,255,0.1);
        }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #0f172a; color: #38bdf8; padding: 15px; font-size: 15px; }
        td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #cbd5e1; font-size: 14px; }
        tr:hover { background: rgba(255,255,255,0.02); }
        .cheat-clean { color: #10b981; font-weight: bold; background: rgba(16,185,129,0.1); padding: 4px 8px; border-radius: 5px; }
        .cheat-warn { color: #ef4444; font-weight: bold; background: rgba(239,68,68,0.1); padding: 4px 8px; border-radius: 5px; }

        /* 👤 Student Detail Card */
        .student-info-card {
            max-width: 900px;
            margin: 0 auto 20px auto;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #38bdf8;
            display: none;
            justify-content: space-between;
            align-items: center;
        }
        .student-info-card h2 { margin: 0 0 5px 0; color: #f8fafc; font-size: 20px; }
        .student-info-card p { margin: 0; color: #94a3b8; font-size: 14px; }
        .score-big { font-size: 32px; font-weight: bold; color: #10b981; }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .photo-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }
        .photo-card img { width: 100%; height: auto; border-radius: 8px; margin-bottom: 10px; }
        .photo-time { font-size: 13px; color: #94a3b8; }
        .status-msg { text-align: center; color: #94a3b8; font-size: 16px; margin-top: 20px; margin-bottom: 20px;}
    </style>
</head>
<body>

    <div class="admin-header">
        <h1><i class="fa-solid fa-user-shield"></i> GVCC Results & Proctoring Control</h1>
        <div class="stats-badge" id="appStatsDisplay">
            <i class="fa-solid fa-download"></i> Total App Downloads: <span id="downloadCount">Loading...</span>
        </div>
        <p style="color: #94a3b8; font-size: 14px;" id="liveTestSubtitle">Select a test to view performance</p>
    </div>

    <div class="control-box">
        <div>
            <select id="testSelectMenu" class="select-style" onchange="updateSubtitleText()">
                <option value="">🔄 Loading Tests...</option>
            </select>
        </div>
        
        <button class="btn-scoreboard" id="loadScoreboardBtn">
            <i class="fa-solid fa-ranking-star"></i> Load Live Scoreboard
        </button>

        <div style="text-align: center; color: #64748b; font-size: 12px;">OR SEARCH INDIVIDUAL EVIDENCE</div>

        <div class="search-box">
            <input type="number" id="studentRollInput" placeholder="Enter Roll Number">
            <button class="btn-search" id="searchBtn"><i class="fa-solid fa-lock"></i> Photos</button>
        </div>
    </div>

    <div id="statusMessage" class="status-msg">Select a test above to load data.</div>

    <!-- 🏆 Scoreboard Container -->
    <div class="scoreboard-container" id="scoreboardContainer">
        <table id="scoreboardTable">
            <thead>
                <tr>
                    <th>Roll No</th>
                    <th>Student Name</th>
                    <th>Score</th>
                    <th>Cheating Status</th>
                    <th>Submission Time</th>
                </tr>
            </thead>
            <tbody id="scoreboardBody">
                <!-- Data will load here dynamically -->
            </tbody>
        </table>
    </div>

    <!-- 👤 Single Student Performance Card -->
    <div class="student-info-card" id="studentInfoCard">
        <div>
            <h2 id="cardName">Student Name</h2>
            <p>Roll: <span id="cardRoll" style="color:white; font-weight:bold;">--</span> | Class: <span id="cardClass">--</span></p>
            <p style="margin-top: 5px;">Status: <span id="cardCheatStatus">--</span></p>
        </div>
        <div style="text-align: right;">
            <div class="score-big" id="cardScore">0/0</div>
            <p id="cardPercent">0%</p>
        </div>
    </div>

    <!-- 📸 Photo Gallery -->
    <div class="gallery-grid" id="photoGallery"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJX_dyLK80p2rNqSVvGY67TpWV7e_UdPI",
            authDomain: "gvcc-database.firebaseapp.com",
            projectId: "gvcc-database",
            storageBucket: "gvcc-database.firebasestorage.app",
            messagingSenderId: "1063216875940",
            appId: "1:1063216875940:web:a4ee2f39b01896b44c5931"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Fetch App Downloads
        async function fetchAppDownloads() {
            try {
                const statsSnap = await getDoc(doc(db, "admin_stats", "app_downloads"));
                if (statsSnap.exists()) {
                    document.getElementById("downloadCount").innerText = statsSnap.data().total_downloads || 0;
                } else {
                    document.getElementById("downloadCount").innerText = "0";
                }
            } catch (error) {
                document.getElementById("downloadCount").innerText = "Error";
            }
        }
        fetchAppDownloads();

        // Load Available Tests
        async function loadAvailableTests() {
            const selectMenu = document.getElementById("testSelectMenu");
            try {
                selectMenu.innerHTML = `
                    <option value="" disabled selected>Select a test to view...</option>
                    <option disabled>────────── Old Tests ──────────</option>
                    <option value="maths_day1">🧮 Day 1 - Arithmetic Foundation</option>
                    <option value="history8_test">📘 Class 8th - History Test</option>
                    <option value="history9_test">📚 Class 9th - History Test</option>
                    <option value="history10_test">📖 Class 10th - History Test</option>
                    <option disabled>────────── New Live Tests ──────────</option>
                `;

                const q = query(collection(db, "active_tests"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        const option = document.createElement("option");
                        option.value = doc.id; 
                        option.text = `📌 ${data.targetClass} - ${data.testName} (${data.subject})`;
                        selectMenu.appendChild(option);
                    });
                }
                updateSubtitleText(); 
            } catch (error) {
                console.error("Error loading tests:", error);
            }
        }
        
        loadAvailableTests();

        window.updateSubtitleText = function() {
            const selectMenu = document.getElementById("testSelectMenu");
            if(selectMenu.options.length > 0 && selectMenu.value !== "") {
                document.getElementById("liveTestSubtitle").innerText = `${selectMenu.options[selectMenu.selectedIndex].text} Viewer`;
            } else {
                document.getElementById("liveTestSubtitle").innerText = `Waiting for test selection...`;
            }
            
            document.getElementById("scoreboardContainer").style.display = "none";
            document.getElementById("studentInfoCard").style.display = "none";
            document.getElementById("photoGallery").innerHTML = "";
            document.getElementById("statusMessage").innerText = "Select an option above to load data.";
        };

        // 🏆 LOAD LIVE SCOREBOARD
        document.getElementById("loadScoreboardBtn").addEventListener("click", async () => {
            const testFolder = document.getElementById("testSelectMenu").value;
            if(!testFolder) { alert("Please select a test from the list first."); return; }

            const tbody = document.getElementById("scoreboardBody");
            const status = document.getElementById("statusMessage");
            
            document.getElementById("photoGallery").innerHTML = "";
            document.getElementById("studentInfoCard").style.display = "none";
            document.getElementById("scoreboardContainer").style.display = "block";
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;">Loading records...</td></tr>`;
            status.innerText = "";

            try {
                const studentsRef = collection(db, "tests", testFolder, "students");
                const querySnapshot = await getDocs(studentsRef);

                if (querySnapshot.empty) {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#ef4444;">No students have submitted this test yet.</td></tr>`;
                    return;
                }

                tbody.innerHTML = ""; 
                let hasSubmissions = false;
                
                // 🚀 SMART LOOP WITH MASTER DATABASE FALLBACK
                for (const documentSnap of querySnapshot.docs) {
                    const data = documentSnap.data();
                    const rollNo = documentSnap.id;
                    
                    if(data.submitted) {
                        hasSubmissions = true;
                        const cheatClass = String(data.cheatStatus).includes("Clean") ? "cheat-clean" : "cheat-warn";
                        
                        let sName = data["Name "] || data["Name"] || data.name || data.studentName;
                        
                        // अगर टेस्ट वाले डेटा में नाम नहीं है, तो मेन 'students' डेटाबेस से निकालो
                        if (!sName || sName === "Unknown") {
                            try {
                                const masterStudentSnap = await getDoc(doc(db, "students", rollNo));
                                if (masterStudentSnap.exists()) {
                                    const mData = masterStudentSnap.data();
                                    sName = mData["Name "] || mData["Name"] || mData.name || mData.studentName;
                                }
                            } catch(e) { console.error("Error fetching master student data"); }
                        }
                        
                        sName = sName || "Unknown";

                        tbody.innerHTML += `
                            <tr>
                                <td><strong>${rollNo}</strong></td>
                                <td>${sName}</td>
                                <td style="color:#38bdf8; font-weight:bold;">${data.score || "0/0"}</td>
                                <td><span class="${cheatClass}">${data.cheatStatus || "Unknown"}</span></td>
                                <td style="font-size:12px;">${data.submittedAt || "N/A"}</td>
                            </tr>
                        `;
                    }
                }
                
                if(!hasSubmissions) {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#ef4444;">No submissions found.</td></tr>`;
                }

            } catch (error) {
                console.error(error);
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#ef4444;">Error fetching results.</td></tr>`;
            }
        });

        // 📸 LOAD INDIVIDUAL EVIDENCE & PHOTOS (WITH ADMIN LOCK)
        document.getElementById("searchBtn").addEventListener("click", async () => {
            const testFolder = document.getElementById("testSelectMenu").value;
            const rollNo = document.getElementById("studentRollInput").value.trim();
            const gallery = document.getElementById("photoGallery");
            const status = document.getElementById("statusMessage");
            const infoCard = document.getElementById("studentInfoCard");

            if(!testFolder) { alert("Please select a test from the list first."); return; }
            if(!rollNo) { alert("Please enter a valid student roll number!"); return; }

            // 🔒 ADMIN PASSWORD CHECK
            const adminPass = prompt("🔒 Enter Admin Password to view confidential evidence photos:");
            
            // 👇 YAHAN SE AAP APNA PASSWORD BADAL SAKTE HAIN 👇
            if (adminPass !== "fr@143") { 
                alert("🚫 Access Denied! You don't have permission to view photos.");
                return; 
            }

            // UI Adjustments
            document.getElementById("scoreboardContainer").style.display = "none";
            gallery.innerHTML = ""; 
            infoCard.style.display = "none";
            status.innerText = "Loading performance and evidence...";

            try {
                const studentDocRef = doc(db, "tests", testFolder, "students", rollNo);
                const studentSnap = await getDoc(studentDocRef);

                if (studentSnap.exists()) {
                    const sData = studentSnap.data();
                    
                    let sName = sData["Name "] || sData["Name"] || sData.name || sData.studentName;
                    let sClass = sData["Class "] || sData["Class"] || sData.class || sData.className;
                    
                    // 🚀 MASTER DATABASE FALLBACK (Agar naam/class missing hai)
                    if (!sName || !sClass) {
                        try {
                            const masterStudentSnap = await getDoc(doc(db, "students", rollNo));
                            if (masterStudentSnap.exists()) {
                                const mData = masterStudentSnap.data();
                                if (!sName) sName = mData["Name "] || mData["Name"] || mData.name || mData.studentName;
                                if (!sClass) sClass = mData["Class "] || mData["Class"] || mData.class || mData.className;
                            }
                        } catch(e) { console.error("Master DB Fetch Error"); }
                    }
                    
                    document.getElementById("cardName").innerText = sName || "Name Not Registered";
                    document.getElementById("cardRoll").innerText = rollNo;
                    document.getElementById("cardClass").innerText = sClass || "Class Not Registered";
                    document.getElementById("cardScore").innerText = sData.score || "0/0";
                    document.getElementById("cardPercent").innerText = sData.percentage || "0%";
                    
                    const cheatStatusBox = document.getElementById("cardCheatStatus");
                    cheatStatusBox.innerText = sData.cheatStatus || "Unknown";
                    cheatStatusBox.style.color = String(sData.cheatStatus).includes("Clean") ? "#10b981" : "#ef4444";
                    
                    infoCard.style.display = "flex";
                }

                const snapCollectionRef = collection(db, "tests", testFolder, "students", rollNo, "snapshots");
                const querySnapshot = await getDocs(snapCollectionRef);

                if (querySnapshot.empty) {
                    status.innerText = `Result loaded, but no photos found for Roll Number: ${rollNo}.`;
                    return;
                }

                status.innerText = `Showing evidence logs for Roll: ${rollNo}`;

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const card = document.createElement("div");
                    card.className = "photo-card";
                    card.innerHTML = `
                        <img src="${data.capturedImage}" alt="Proctoring Log Snap">
                        <div class="photo-time"><i class="fa-solid fa-clock"></i> ${data.capturedAt || "Unknown Time"}</div>
                    `;
                    gallery.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                status.innerText = "Error fetching data from the database.";
            }
        });
    </script>
</body>
</html>
