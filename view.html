<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVCC - Proctoring Admin Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
        }
        .admin-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
        }
        .admin-header h1 { color: #38bdf8; margin: 0; font-size: 24px; }
        
        /* Form Box Styles for Dropdown and Search Input */
        .control-box {
            max-width: 500px;
            margin: 0 auto 30px auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(255,255,255,0.02);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .select-style, .search-box input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(15, 23, 42, 0.8);
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        .select-style:focus, .search-box input:focus {
            outline: none;
            border-color: #38bdf8;
        }
        .search-box {
            display: flex;
            gap: 10px;
        }
        .btn-search {
            background: #007bff;
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: background 0.2s;
        }
        .btn-search:hover {
            background: #0056b3;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .photo-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .photo-card img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            background: #1e293b;
            margin-bottom: 10px;
        }
        .photo-time {
            font-size: 13px;
            color: #94a3b8;
        }
        .status-msg { text-align: center; color: #94a3b8; font-size: 16px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="admin-header">
        <h1><i class="fa-solid fa-user-shield"></i> GVCC Proctoring Monitoring Panel</h1>
        <!-- Dynamic subtitle that changes based on select dropdown -->
        <p style="color: #94a3b8; font-size: 14px;" id="liveTestSubtitle">Active System Evidence Viewer</p>
    </div>

    <div class="control-box">
        <!-- 🎯 Test Selection Dropdown Menu -->
        <div>
            <select id="testSelectMenu" class="select-style" onchange="updateSubtitleText()">
                <option value="maths_day1">🧮 Day 1 - Arithmetic Foundation (Maths)</option>
                <option value="history9_test">📚 Class 9th - History Test</option>
            </select>
        </div>
        
        <div class="search-box">
            <input type="text" id="studentRollInput" placeholder="Enter Student Roll (e.g. 902)">
            <button class="btn-search" id="searchBtn">View Photos</button>
        </div>
    </div>

    <div id="statusMessage" class="status-msg">Select a test, enter a roll number, and click View Photos.</div>
    <div class="gallery-grid" id="photoGallery"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJX_dyLK80p2rNqSVvGY67TpWV7e_UdPI",
            authDomain: "gvcc-database.firebaseapp.com",
            projectId: "gvcc-database",
            storageBucket: "gvcc-database.firebasestorage.app",
            messagingSenderId: "1063216875940",
            appId: "1:1063216875940:web:a4ee2f39b01896b44c5931"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Subtitle dynamic text renderer engine
        window.updateSubtitleText = function() {
            const selectMenu = document.getElementById("testSelectMenu");
            const subtitle = document.getElementById("liveTestSubtitle");
            const selectedText = selectMenu.options[selectMenu.selectedIndex].text;
            subtitle.innerText = `${selectedText} Live Evidence Viewer`;
        };
        
        // Initial setup run
        updateSubtitleText();

        // Snap Retrieval Engine Click Handler Hook
        document.getElementById("searchBtn").addEventListener("click", async () => {
            const selectedTestFolder = document.getElementById("testSelectMenu").value;
            const rollNo = document.getElementById("studentRollInput").value.trim();
            const gallery = document.getElementById("photoGallery");
            const status = document.getElementById("statusMessage");

            if(!rollNo) {
                alert("Please enter a valid student roll number!");
                return;
            }

            gallery.innerHTML = "";
            status.innerText = "Loading proctoring snapshots from main server...";

            try {
                // 🚀 Dynamic Collection Path: tests -> [selectedTestFolder] -> students -> [rollNo] -> snapshots
                const snapCollectionRef = collection(db, "tests", selectedTestFolder, "students", rollNo, "snapshots");
                const querySnapshot = await getDocs(snapCollectionRef);

                if (querySnapshot.empty) {
                    status.innerText = `No snapshots found for Roll Number: ${rollNo} in this specific test.`;
                    return;
                }

                status.innerText = `Showing evidence logs for Roll: ${rollNo}`;

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const base64ImageString = data.capturedImage;
                    const captureTime = data.capturedAt || "Unknown Time";

                    const card = document.createElement("div");
                    card.className = "photo-card";

                    const img = document.createElement("img");
                    img.src = base64ImageString; 
                    img.alt = "Proctoring Log Snap";

                    const timeInfo = document.createElement("div");
                    timeInfo.className = "photo-time";
                    timeInfo.innerHTML = `<i class="fa-solid fa-clock"></i> ${captureTime}`;

                    card.appendChild(img);
                    card.appendChild(timeInfo);
                    gallery.appendChild(card);
                });

            } catch (error) {
                console.error("Error fetching evidence logs: ", error);
                status.innerText = "Error establishing secure connection with the database backend.";
            }
        });
    </script>
</body>
</html>
