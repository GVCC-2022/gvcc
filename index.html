            align-items: center;
            justify-content: center;

        .btn-install {

            background: #ffffff;

            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        @keyframes bounce { 
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 
            40% {transform: translateY(-4px);} 
            60% {transform: translateY(-2px);} 
        }

        @keyframes pulseGlow {
            from { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.4); }
            to { box-shadow: 0 0 15px 8px rgba(14, 165, 233, 0); }
        }
        
        .page-exit {
            animation: zoomOutUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards !important;

        @keyframes zoomOutUp {

<div class="landing-container">

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
    import { getFirestore, doc, setDoc, increment, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";
    import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-messaging.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBJX_dyLK80p2rNqSVvGY67TpWV7e_UdPI",
        authDomain: "gvcc-database.firebaseapp.com",
        projectId: "gvcc-database",
        storageBucket: "gvcc-database.firebasestorage.app",
        messagingSenderId: "1063216875940",
        appId: "1:1063216875940:web:a4ee2f39b01896b44c5931"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const messaging = getMessaging(app);

    // 🌟 SMART NOTIFICATION SYSTEM 🌟
    // 👇 Yahan apni VAPID Key jarur dalein 👇
    const VAPID_KEY = "BCm8eNsThwmymZsqhfaDcHw37fLgNI2qWnr8aLUc0xWSCl0BuhRSkZ0KrYI1D8n0wzK8MY5fybOgMVWoXAR97VM";

    setTimeout(async () => {
        if ("Notification" in window && Notification.permission === "default") {
            try {
                const permission = await Notification.requestPermission();
                if (permission === "granted") {
                    console.log("🔔 Notification Permission Granted!");
                    const token = await getToken(messaging, { vapidKey: VAPID_KEY });
                    if (token) {
                        await addDoc(collection(db, "notification_tokens"), {
                            token: token,
                            userType: "Index Visitor",
                            timestamp: serverTimestamp()
                        });
                        console.log("✅ Device Token Saved!");
                    }
                }
            } catch (error) {
                console.log("⚠️ Notification Setup Error:", error);
            }
        }
    }, 2000); // 2 Second baad notification aayega

    // App Download Tracker
    window.addEventListener('appinstalled', async () => {
        try {
            const statsRef = doc(db, "admin_stats", "app_downloads");
            await setDoc(statsRef, {
                total_downloads: increment(1),
                last_installed_at: new Date().toLocaleString("en-IN", { timeZone: "Asia/Kolkata" })
            }, { merge: true });
        } catch (e) {
            console.error("Error updating count:", e);
        }
    });
</script>

<script>
    let deferredPrompt;
    
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
    });

    window.installApp = async function() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
        } else {
            alert("📲 App Install Kaise Karein:\n\n1. Apne browser ke upar ya niche 3 dots (⋮) par click karein.\n2. 'Add to Home Screen' ya 'Install App' par click karein.\n3. App aapke phone mein aa jayegi!");
        }
    };

    if ("serviceWorker" in navigator) {
        window.addEventListener("load", function() {
            navigator.serviceWorker.register("/service-worker.js", { scope: "/" })
            .catch(function(error) { console.log("PWA Error:", error); });
        });
    }

    // 🌟 FIXED: Ab yahan purani permission logic nahi hai, siraf smooth animation hai
    function openPortal(url) {
        const container = document.querySelector('.landing-container');
        container.classList.add('page-exit');
        
        setTimeout(() => {
            window.location.href = url;
        }, 400); 
    }

    window.addEventListener('pageshow', function(event) {
        if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
            const container = document.querySelector('.landing-container');
            if (container) {
                container.classList.remove('page-exit');
            }
        }
    });
</script>
