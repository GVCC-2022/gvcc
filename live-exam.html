<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Class Updates - GVCC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; margin: 0; padding: 0; overscroll-behavior-y: none; }
        .header { background: #003366; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .container { max-width: 500px; margin: 20px auto; padding: 0 15px; }
        
        /* Timeline List Styling */
        .update-item { 
            background: white; margin-bottom: 15px; padding: 15px; border-radius: 12px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 4px solid #8b5cf6;
        }
        .meta { display: flex; justify-content: space-between; font-size: 11px; color: #64748b; margin-bottom: 8px; }
        .teacher-badge { background: #e0f2fe; color: #0284c7; padding: 2px 8px; border-radius: 4px; font-weight: 700; }
        .content-box { background: #f8fafc; padding: 10px; border-radius: 8px; font-size: 14px; color: #334155; border: 1px solid #e2e8f0; }
        
        /* 🌟 NAYA: View Homework Button */
        .btn-view-hw {
            background: #10b981; color: white; border: none; padding: 10px 15px;
            border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer;
            display: block; width: 100%; text-align: center; margin-top: 10px;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2); transition: 0.2s;
        }
        .btn-view-hw:active { transform: scale(0.96); }

        .video-link { 
            display: block; text-align: center; margin-top: 10px; background: #fee2e2; 
            color: #ef4444; padding: 8px; border-radius: 6px; text-decoration: none; 
            font-size: 13px; font-weight: bold; 
        }

        /* 🌟 NAYA: Homework Modal (Popup) Styling */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; 
            padding: 15px; box-sizing: border-box; backdrop-filter: blur(5px);
        }
        .modal-content { 
            background: white; width: 100%; max-width: 400px; border-radius: 12px; 
            padding: 20px; max-height: 85vh; overflow-y: auto; position: relative; animation: popIn 0.3s; 
        }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 26px; color: #64748b; cursor: pointer; }
        /* white-space: pre-wrap; ki wajah se aapka lamba text line-by-line dikhega */
        .hw-text { 
            font-size: 15px; color: #334155; line-height: 1.6; white-space: pre-wrap; 
            margin-top: 15px; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; 
        }

        /* Fun Empty State Animation */
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .empty-state {
            text-align: center; margin-top: 40px; padding: 30px 20px; background: white; 
            border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            border: 2px dashed #cbd5e1; animation: popIn 0.5s forwards;
        }
    </style>
</head>
<body>

    <div class="header" onclick="window.history.back()">
        <i class="fa-solid fa-arrow-left" style="float:left; margin-top: 3px;"></i> Daily Class Diary
    </div>

    <div class="container" id="diaryList">
        <div style="text-align: center; margin-top: 50px; color: #64748b;">
            <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
            <p>Loading updates...</p>
        </div>
    </div>

    <!-- 🌟 NAYA: Homework Modal (Popup box) -->
    <div class="modal" id="hwModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeHomeworkModal()">&times;</span>
            <h3 style="color: #10b981; margin-top: 0; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px;">
                <i class="fa-solid fa-book-open-reader"></i> Class Homework
            </h3>
            <div style="font-size: 13px; color: #64748b; margin-bottom: 10px;" id="modalSubtitle"></div>
            
            <!-- Yahan bachho ko aapka pura copy-paste kiya hua text dikhega -->
            <div class="hw-text" id="modalHWText"></div>
            
            <button onclick="closeHomeworkModal()" style="width:100%; background:#0f172a; color:white; border:none; padding:12px; border-radius:6px; margin-top:15px; font-weight:bold; font-size:15px; cursor:pointer;">
                Close
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJX_dyLK80p2rNqSVvGY67TpWV7e_UdPI",
            authDomain: "gvcc-database.firebaseapp.com",
            projectId: "gvcc-database",
            storageBucket: "gvcc-database.firebasestorage.app",
            messagingSenderId: "1063216875940",
            appId: "1:1063216875940:web:a4ee2f39b01896b44c5931"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const studentClass = localStorage.getItem("studentClass") || "All"; 

        const q = query(collection(db, "daily_diary"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById("diaryList");
            list.innerHTML = "";
            let hasData = false;

            snapshot.forEach((doc) => {
                const data = doc.data();
                if(data.targetClass === "All" || data.targetClass === studentClass || studentClass.includes(data.targetClass)) {
                    hasData = true;
                    
                    // Lamba text safely pass karne ke liye encode kiya gaya hai
                    const safeHW = encodeURIComponent(data.homework || "आज कोई लिखित होमवर्क नहीं है।");

                    list.innerHTML += `
                        <div class="update-item">
                            <div class="meta">
                                <span style="font-weight:bold; color:#1e293b;"><i class="fa-solid fa-book" style="color:#8b5cf6;"></i> ${data.subject}</span>
                                <span>${data.date}</span>
                            </div>
                            <div style="margin-bottom:8px;"><span class="teacher-badge">👨‍🏫 By: ${data.teacherName}</span></div>
                            <div class="content-box">
                                <strong style="color:#0ea5e9;">📝 Topic:</strong> ${data.classTopic}
                            </div>
                            
                            <!-- 🌟 NAYA: View Homework Button -->
                            <button class="btn-view-hw" onclick="openHomeworkModal('${safeHW}', '${data.teacherName}', '${data.subject}')">
                                <i class="fa-solid fa-file-pen"></i> View Homework
                            </button>

                            ${data.videoLink ? `<a href="${data.videoLink}" target="_blank" class="video-link"><i class="fa-brands fa-youtube"></i> Basic Video देखें</a>` : ''}
                        </div>
                    `;
                }
            });

            // 🌟 मजेदार Empty State 🌟
            if (!hasData) {
                list.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-regular fa-face-rolling-eyes fa-bounce" style="font-size: 60px; color: #8b5cf6; margin-bottom: 20px;"></i>
                        <h3 style="color: #1e293b; margin-bottom: 10px; font-size: 20px;">अरे सन्नाटा क्यों है भाई? 😅</h3>
                        <p style="color: #64748b; font-size: 15px; line-height: 1.6; margin-bottom: 20px;">
                            आज का कोई अपडेट या होमवर्क नहीं मिला... लगता है <strong>Md Faiyaz</strong> सर अभी तक भूल गए हैं! 
                        </p>
                        <div style="background: #f1f5f9; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0;">
                            <span style="font-size: 13px; color: #475569;">जल्दी से उन्हें मैसेज करो और पूछो:</span><br>
                            <span style="color: #ef4444; font-weight: bold; font-size: 16px; display: inline-block; margin-top: 5px;">"सर, आज का होमवर्क कहाँ है?" 🚀</span>
                        </div>
                    </div>
                `;
            }
        });
    </script>

    <!-- 🌟 NAYA: Modal Open/Close Logic -->
    <script>
        window.openHomeworkModal = function(encodedHW, teacherName, subject) {
            document.getElementById("modalSubtitle").innerHTML = `<strong>Subject:</strong> ${subject} <br> <strong>Teacher:</strong> ${teacherName}`;
            // Yahan text wapas decode hokar line-by-line set ho jayega
            document.getElementById("modalHWText").innerText = decodeURIComponent(encodedHW);
            document.getElementById("hwModal").style.display = "flex";
        }

        window.closeHomeworkModal = function() {
            document.getElementById("hwModal").style.display = "none";
        }
    </script>
</body>
</html>
