<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>GVCC Student Portal - Login</title>
    
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; text-align: center; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 10px; max-width: 350px; margin: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #007bff; color: white; padding: 12px; border: none; border-radius: 8px; width: 95%; cursor: pointer; font-size: 16px; }
        button:disabled { background: #cccccc; cursor: not-allowed; }
        h1 { color: #003366; }
        #msg { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h1>🎓 Student Portal</h1>
    
    <form id="loginForm">
        <input type="text" id="roll" placeholder="Roll Number" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" id="loginBtn">Login</button>
    </form>
    
    <p id="msg"></p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

    // Aapka Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBJX_dyLK80p2rNqSVvGY67TpWV7e_UdPI",
        authDomain: "gvcc-database.firebaseapp.com",
        projectId: "gvcc-database",
        storageBucket: "gvcc-database.firebasestorage.app",
        messagingSenderId: "1063216875940",
        appId: "1:1063216875940:web:a4ee2f39b01896b44c5931"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Form submit par yeh code chalega
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
        e.preventDefault(); // Yeh page ko turant reload hone se rokta hai
        
        const loginBtn = document.getElementById("loginBtn");
        const msg = document.getElementById("msg");
        
        let roll = document.getElementById("roll").value.trim();
        let password = document.getElementById("password").value.trim();

        // Button disabled aur loading msg
        loginBtn.disabled = true;
        msg.style.color = "orange";
        msg.innerHTML = "🔄 Checking credentials...";

        try {
            // Firestore se us roll ਨੰਬਰ ka document mangwana
            const docRef = doc(db, "students", roll);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                let data = docSnap.data();
                
                // Dono ko String me convert karke compare karna taaki type-mismatch na ho
                let dbPassword = String(data.Password).trim();
                let inputPassword = String(password).trim();

                if (dbPassword === inputPassword) {
                    msg.style.color = "green";
                    msg.innerHTML = "✅ Login Successful! Redirecting...";
                    
                    // LocalStorage me student ka roll number save karna
                    localStorage.setItem("studentRoll", roll);
                    
                    // Dashboard page par bhejna
                    window.location.href = "dashboard.html";
                } else {
                    msg.style.color = "red";
                    msg.innerHTML = "❌ Wrong Password";
                    loginBtn.disabled = false;
                }
            } else {
                msg.style.color = "red";
                msg.innerHTML = "❌ Roll Number Not Found";
                loginBtn.disabled = false;
            }
        } catch (error) {
            console.error("Error: ", error);
            msg.style.color = "red";
            msg.innerHTML = "⚠️ Network error. Try again.";
            loginBtn.disabled = false;
        }
    });
</script>

</body>
</html>
