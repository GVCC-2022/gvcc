<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Gyan Varsha Coaching Center - Login</title>
<link rel="manifest" href="manifest.json">
    
<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* 🎯 Entry Animation for Card & Logo Together */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Main Wrapper container for absolute layout */
.login-container {
    position: relative;
    width: 85%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

/* 🎯 Logo Position - Isko bada kiya aur center alignment thik kiya */
.login-logo {
    width: 250px !important; /* 👈 Bada size jaisa aapne bola */
    height: auto;
    background: transparent !important;
    padding: 0 !important;
    border-radius: 0 !important;
    position: absolute;
    
    /* 📐 Logo ka balance card ke upar banaye rakhne ke liye adjust kiya */
    top: -145px; 
    
    /* 🎯 Exact Horizontal Center */
    left: 60%;
    transform: translateX(-40%);
    
    /* 🌟 Soft Professional Shadow */
    filter: drop-shadow(0px 6px 10px rgba(0, 0, 0, 0.12));
    z-index: 10;
}

/* 📦 White Card Position - Top padding thodi badhai taaki bade logo ke niche space mile */
.login-card {
    background: #ffffff !important;
    padding: 135px 25px 40px 25px !important; 
    border-radius: 24px !important;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.06) !important;
    width: 100%;
    max-width: 400px;
    text-align: center;
    box-sizing: border-box;
    position: relative;
    margin: 0 auto; 
}

.title {
    color: #003366;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 25px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

input {
    display: block;
    width: 95%;
    padding: 14px;
    margin: 18px auto;
    border: 1.5px solid #e2e8f0;
    border-radius: 12px;
    font-size: 16px;
    box-sizing: border-box;
    transition: all 0.3s ease;
    background-color: #f8fafc;
}

input:focus {
    border-color: #007bff;
    background-color: #fff;
    box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.15);
    outline: none;
}

.btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: #007bff;
    color: white;
    padding: 14px;
    margin: 25px auto 10px auto;
    width: 95%;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 12px rgba(0, 123, 255, 0.2);
}

.btn:hover:not(:disabled) {
    background: #0056b3;
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(0, 123, 255, 0.3);
}

.btn:active:not(:disabled) {
    transform: translateY(0);
}

.btn:disabled {
    background: #a0aec0;
    cursor: not-allowed;
    box-shadow: none;
}

/* 🔄 Spinner Animation */
.spinner {
    width: 18px;
    height: 18px;
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* ✨ Animation waala name box */
#dynamicName {
    font-size: 14px;
    color: #28a745;
    margin: -10px auto 10px auto;
    font-weight: 600;
    width: 95%;
    text-align: left;
    height: 18px;
    opacity: 0;
    transform: translateY(-5px);
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

#dynamicName.show {
    opacity: 1;
    transform: translateY(0);
}

#msg {
    font-weight: 600;
    font-size: 14px;
    margin-top: 20px;
    transition: all 0.3s ease;
}
</style>
</head>
<body>

<div class="login-container">
    <!-- ✅ Aapki nayi transparent file aur bada layout set ho gaya -->
    <img src="20260620_144347.png" alt="GVCC Logo" class="login-logo">

    <div class="login-card">
        <div class="title">🎓 Student Portal</div>
        
        <form id="loginForm">
            <input type="number" id="roll" placeholder="Roll Number" required>
            
            <div id="dynamicName"></div>
            
            <input type="password" id="password" placeholder="Password" required>
            
            <button type="submit" class="btn" id="loginBtn">
                <span class="spinner" id="btnSpinner"></span>
                <span id="btnText">Login</span>
            </button>
        </form>
        
        <div id="msg"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBJX_dyLK80p2rNqSVvGY67TpWV7e_UdPI",
        authDomain: "gvcc-database.firebaseapp.com",
        projectId: "gvcc-database",
        storageBucket: "gvcc-database.firebasestorage.app",
        messagingSenderId: "1063216875940",
        appId: "1:1063216875940:web:a4ee2f39b01896b44c5931"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const rollInput = document.getElementById("roll");
    const nameDiv = document.getElementById("dynamicName");

    // 👤 LIVE NAME FETCHING LOGIC
    rollInput.addEventListener("input", async function() {
        let roll = this.value.trim();

        if (roll.length >= 3) { 
            try {
                const docRef = doc(db, "students", roll);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    let data = docSnap.data();
                    let studentName = data["Name "] || data.Name || "Unknown Student";
                    
                    nameDiv.innerText = `👤 ${studentName}`;
                    nameDiv.classList.add("show");
                } else {
                    nameDiv.classList.remove("show");
                }
            } catch (error) {
                console.error("Live fetch error:", error);
            }
        } else {
            nameDiv.classList.remove("show");
        }
    });

    // 🕒 Attendance Log Function
    async function saveLoginLog(rollNumber, studentName) {
        try {
            const now = new Date();
            const formattedDate = now.toLocaleDateString("en-IN", { timeZone: "Asia/Kolkata" }).replace(/\//g, "-");
            const formattedTime = now.toLocaleTimeString("en-IN", { timeZone: "Asia/Kolkata", hour12: false }).replace(/:/g, "-");
            const customDocID = `${rollNumber}_${formattedDate}_${formattedTime}`;

            await setDoc(doc(db, "login_logs", customDocID), {
                roll: rollNumber,
                name: studentName,
                loginTime: now.toLocaleString("en-IN", { timeZone: "Asia/Kolkata" }),
                timestamp: now
            });
        } catch (error) {
            console.error("Error saving log:", error);
        }
    }

    // Login Form Submit Logic
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
        e.preventDefault(); 
        
        const loginBtn = document.getElementById("loginBtn");
        const btnSpinner = document.getElementById("btnSpinner");
        const btnText = document.getElementById("btnText");
        const msg = document.getElementById("msg");
        
        let roll = rollInput.value.trim();
        let password = document.getElementById("password").value.trim();

        loginBtn.disabled = true;
        btnSpinner.style.display = "block";
        btnText.innerText = "Checking...";
        msg.style.color = "#d97706";
        msg.innerHTML = "🔄 Verifying credentials...";

        try {
            const docRef = doc(db, "students", roll);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                let data = docSnap.data();
                let rawPassword = data["Password "] || data.Password || data["password "]; 
                let studentName = data["Name "] || data.Name || "Unknown Student";
                
                let dbPassword = String(rawPassword).trim();
                let inputPassword = String(password).trim();

                if (dbPassword === inputPassword) {
                    msg.style.color = "#16a34a";
                    msg.innerHTML = "✅ Login Successful! Recording attendance...";
                    
                    localStorage.setItem("studentRoll", roll);
                    await saveLoginLog(roll, studentName);
                    
                    msg.innerHTML = "🚀 Redirecting to Dashboard...";

                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 1200);
                } else {
                    msg.style.color = "#dc2626";
                    msg.innerHTML = "❌ Wrong Password";
                    resetButton();
                }
            } else {
                msg.style.color = "#dc2626";
                msg.innerHTML = "❌ Roll Number Not Found";
                resetButton();
            }
        } catch (error) {
            console.error("Error: ", error);
            msg.style.color = "#dc2626";
            msg.innerHTML = "⚠️ Network error. Try again.";
            resetButton();
        }

        function resetButton() {
            loginBtn.disabled = false;
            btnSpinner.style.display = "none";
            btnText.innerText = "Login";
        }
    });
</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("/gvcc/service-worker.js", { scope: "/gvcc/" })
      .then(function(reg) { console.log("PWA Service Worker Loaded!", reg); })
      .catch(function(error) { console.log("PWA Error:", error); });
  });
}
</script>
    
</body>
</html>
