<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Gyan Varsha Coaching Center - Student Login</title>
<link rel="manifest" href="manifest.json">

<!-- FontAwesome for Premium Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    color: white;
    overflow: hidden;
}

/* 🎯 Entry Animation for Card & Logo Together */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(-5vh);
    }
}

/* Main Wrapper container */
.login-container {
    position: relative;
    width: 85%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

/* 🎯 Logo Position */
.login-logo {
    width: 260px;
    height: auto;
    position: relative;
    z-index: 10;
    margin-bottom: -110px; /* यह कार्ड को लोगो के पीछे खींचता है */
    filter: drop-shadow(0px 8px 15px rgba(0, 0, 0, 0.3));
    top: 0px;  
    left: 10px;
}

/* 📦 Premium Dark Glass Card */
.login-card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    padding: 120px 30px 40px 30px; 
    border-radius: 24px;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.1);
    width: 100%;
    text-align: center;
    box-sizing: border-box;
    position: relative;
}

.title {
    color: #38bdf8;
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 25px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    letter-spacing: 1px;
}

/* 🚀 Premium Install Button Style */
.install-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #0ea5e9, #2563eb) !important;
    color: white !important;
    border: none !important;
    border-radius: 14px !important;
    font-size: 16px !important;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    box-sizing: border-box;
    margin-bottom: 20px !important;
    box-shadow: 0 6px 20px rgba(14, 165, 233, 0.3) !important;
    animation: pulseGlow 2s infinite alternate;
}

.install-btn:hover { 
    transform: translateY(-3px); 
    box-shadow: 0 8px 25px rgba(14, 165, 233, 0.5) !important; 
}

.install-btn i {
    animation: bounce 2s infinite;
    font-size: 20px;
}

.divider {
    display: flex;
    align-items: center;
    text-align: center;
    color: #64748b;
    font-size: 12px;
    font-weight: 600;
    margin: 25px 0;
}
.divider::before, .divider::after {
    content: '';
    flex: 1;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}
.divider:not(:empty)::before { margin-right: .5em; }
.divider:not(:empty)::after { margin-left: .5em; }

/* 🔒 Input Styling (Glass Style) */
input {
    display: block;
    width: 100%;
    padding: 16px;
    margin: 18px auto;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 14px;
    font-size: 16px;
    box-sizing: border-box;
    transition: all 0.3s ease;
    background: rgba(255, 255, 255, 0.05);
    color: white;
}

input::placeholder {
    color: #94a3b8;
}

input:focus {
    border-color: #38bdf8;
    background: rgba(255, 255, 255, 0.1);
    box-shadow: 0 0 12px rgba(56, 189, 248, 0.2);
    outline: none;
}

/* 🔘 Login Button Style */
.btn-login {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: #ffffff;
    color: #0f172a;
    padding: 16px;
    margin: 25px auto 10px auto;
    width: 100%;
    border: none;
    border-radius: 14px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
}

.btn-login:hover:not(:disabled) {
    background: #f1f5f9;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255, 255, 255, 0.2);
}

.btn-login:active:not(:disabled) {
    transform: translateY(0);
}

.btn-login:disabled {
    background: rgba(255, 255, 255, 0.2);
    color: #94a3b8;
    cursor: not-allowed;
    box-shadow: none;
}

/* 🔄 Spinner Animation */
.spinner {
    width: 18px;
    height: 18px;
    border: 3px solid rgba(15, 23, 42, 0.3);
    border-top-color: #0f172a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

@keyframes bounce { 
    0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 
    40% {transform: translateY(-4px);} 
    60% {transform: translateY(-2px);} 
}

@keyframes pulseGlow {
    from { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.4); }
    to { box-shadow: 0 0 15px 8px rgba(14, 165, 233, 0); }
}

/* ✨ Animation waala name box */
#dynamicName {
    font-size: 14px;
    color: #4ade80;
    margin: -10px auto 10px auto;
    font-weight: 600;
    width: 100%;
    text-align: left;
    height: 18px;
    opacity: 0;
    transform: translateY(-5px);
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    padding-left: 5px;
}

#dynamicName.show {
    opacity: 1;
    transform: translateY(0);
}

#msg {
    font-weight: 600;
    font-size: 14px;
    margin-top: 20px;
    transition: all 0.3s ease;
}
</style>
</head>
<body>

<div class="login-container">
    <img src="20260620_144347.png" alt="GVCC Logo" class="login-logo">

    <div class="login-card">
        <div class="title"><i class="fa-solid fa-user-graduate"></i> Student Portal</div>
        
        <!-- 🚀 Smart Install App Button -->
        <button type="button" class="install-btn" onclick="installApp()">
            <i class="fa-solid fa-cloud-arrow-down"></i> Install GVCC App
        </button>

        <div class="divider">SELECT YOUR LOGIN</div>
        
        <form id="loginForm">
            <input type="number" id="roll" placeholder="Roll Number" required>
            
            <div id="dynamicName"></div>
            
            <input type="password" id="password" placeholder="Password" required>
            
            <button type="submit" class="btn-login" id="loginBtn">
                <span class="spinner" id="btnSpinner"></span>
                <span id="btnText">Login</span>
            </button>
        </form>
        
        <div id="msg"></div>
    </div>
</div>

<!-- 📲 Smart Install Logic -->
<script>
    let deferredPrompt;
    
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
    });

    window.installApp = async function() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                console.log('App Installed Successfully!');
            }
            deferredPrompt = null;
        } else {
            alert("📲 App Install Kaise Karein:\n\n1. Apne browser ke upar ya niche 3 dots (⋮) par click karein.\n2. 'Add to Home Screen' ya 'Install App' par click karein.\n3. Bas! Ab app aapke phone me install ho jayegi aur aap login kar payenge.");
        }
    };
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, increment } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBJX_dyLK80p2rNqSVvGY67TpWV7e_UdPI",
        authDomain: "gvcc-database.firebaseapp.com",
        projectId: "gvcc-database",
        storageBucket: "gvcc-database.firebasestorage.app",
        messagingSenderId: "1063216875940",
        appId: "1:1063216875940:web:a4ee2f39b01896b44c5931"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 🎯 BACKGROUND TRACKER: Jab App Install Hogi tab
    window.addEventListener('appinstalled', async () => {
        console.log('✅ App was installed successfully by user!');
        try {
            const statsRef = doc(db, "admin_stats", "app_downloads");
            await setDoc(statsRef, {
                total_downloads: increment(1),
                last_installed_at: new Date().toLocaleString("en-IN", { timeZone: "Asia/Kolkata" })
            }, { merge: true });
        } catch (e) {
            console.error("Error updating download count: ", e);
        }
    });

    const rollInput = document.getElementById("roll");
    const nameDiv = document.getElementById("dynamicName");

    // 👤 LIVE NAME FETCHING LOGIC
    rollInput.addEventListener("input", async function() {
        let roll = this.value.trim();

        if (roll.length >= 3) { 
            try {
                const docRef = doc(db, "students", roll);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    let data = docSnap.data();
                    let studentName = data["Name "] || data.Name || "Unknown Student";
                    
                    nameDiv.innerText = `👤 ${studentName}`;
                    nameDiv.classList.add("show");
                } else {
                    nameDiv.classList.remove("show");
                }
            } catch (error) {
                console.error("Live fetch error:", error);
            }
        } else {
            nameDiv.classList.remove("show");
        }
    });

    // 🕒 Attendance Log Function
    async function saveLoginLog(rollNumber, studentName) {
        try {
            const now = new Date();
            const formattedDate = now.toLocaleDateString("en-IN", { timeZone: "Asia/Kolkata" }).replace(/\//g, "-");
            const formattedTime = now.toLocaleTimeString("en-IN", { timeZone: "Asia/Kolkata", hour12: false }).replace(/:/g, "-");
            const customDocID = `${rollNumber}_${formattedDate}_${formattedTime}`;

            await setDoc(doc(db, "login_logs", customDocID), {
                roll: rollNumber,
                name: studentName,
                loginTime: now.toLocaleString("en-IN", { timeZone: "Asia/Kolkata" }),
                timestamp: now
            });
        } catch (error) {
            console.error("Error saving log:", error);
        }
    }

    // Login Form Submit Logic
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
        e.preventDefault(); 
        
        const loginBtn = document.getElementById("loginBtn");
        const btnSpinner = document.getElementById("btnSpinner");
        const btnText = document.getElementById("btnText");
        const msg = document.getElementById("msg");
        
        let roll = rollInput.value.trim();
        let password = document.getElementById("password").value.trim();

        loginBtn.disabled = true;
        btnSpinner.style.display = "block";
        btnText.innerText = "Checking...";
        msg.style.color = "#fbbf24";
        msg.innerHTML = "🔄 Verifying credentials...";

        try {
            const docRef = doc(db, "students", roll);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                let data = docSnap.data();
                let rawPassword = data["Password "] || data.Password || data["password "]; 
                let studentName = data["Name "] || data.Name || "Unknown Student";
                
                let dbPassword = String(rawPassword).trim();
                let inputPassword = String(password).trim();

                if (dbPassword === inputPassword) {
                    msg.style.color = "#4ade80";
                    msg.innerHTML = "✅ Login Successful! Recording attendance...";
                    
                    localStorage.setItem("studentRoll", roll);
                    await saveLoginLog(roll, studentName);
                    
                    msg.innerHTML = "🚀 Redirecting to Dashboard...";

                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 1200);
                } else {
                    msg.style.color = "#f87171";
                    msg.innerHTML = "❌ Wrong Password";
                    resetButton();
                }
            } else {
                msg.style.color = "#f87171";
                msg.innerHTML = "❌ Roll Number Not Found";
                resetButton();
            }
        } catch (error) {
            console.error("Error: ", error);
            msg.style.color = "#f87171";
            msg.innerHTML = "⚠️ Network error. Try again.";
            resetButton();
        }

        function resetButton() {
            loginBtn.disabled = false;
            btnSpinner.style.display = "none";
            btnText.innerText = "Login";
        }
    });
</script>

<script>
// 🚀 Service worker registration updated for Custom Domain
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("/service-worker.js", { scope: "/" })
      .then(function(reg) { console.log("PWA Service Worker Loaded!", reg); })
      .catch(function(error) { console.log("PWA Error:", error); });
  });
}
</script>
    
</body>
</html>
