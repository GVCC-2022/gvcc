<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Gyan Varsha Coaching Center - Login</title>
<link rel="manifest" href="manifest.json">
    
<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
}

.login-container {
    position: relative;
    width: 85%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

/* 🎯 Login Page ke liye Logo size bada kar diya */
.login-logo {
    width: 280px !important; 
    height: auto;
    background: transparent !important;
    padding: 0 !important;
    border-radius: 0 !important;
    position: absolute;
    top: -140px; 
    left: 50%;
    transform: translateX(-50%);
    filter: drop-shadow(0px 6px 10px rgba(0, 0, 0, 0.12));
    z-index: 10;
}

.login-card {
    background: #ffffff !important;
    padding: 130px 25px 40px 25px !important; 
    border-radius: 24px !important;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.06) !important;
    width: 100%;
    max-width: 400px;
    text-align: center;
    box-sizing: border-box;
    position: relative;
    margin: 0 auto; 
}

.title { color: #003366; font-size: 24px; font-weight: 700; margin-bottom: 25px; }

input {
    display: block; width: 95%; padding: 14px; margin: 18px auto;
    border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 16px;
    box-sizing: border-box; background-color: #f8fafc;
}

.btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: #007bff; color: white; padding: 14px; margin: 25px auto 10px auto;
    width: 95%; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer;
}

#dynamicName {
    font-size: 14px; color: #28a745; margin: -10px auto 10px auto; font-weight: 600;
    width: 95%; text-align: left; height: 18px; opacity: 0; transition: all 0.3s;
}
#dynamicName.show { opacity: 1; }
#msg { font-weight: 600; font-size: 14px; margin-top: 20px; }
</style>
</head>
<body>

<div class="login-container">
    <!-- ✅ Naya file naam aur fixed display -->
    <img src="20260620_144347.png" alt="GVCC Logo" class="login-logo">

    <div class="login-card">
        <div class="title">🎓 Student Portal</div>
        <form id="loginForm">
            <input type="number" id="roll" placeholder="Roll Number" required>
            <div id="dynamicName"></div>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="btn" id="loginBtn">Login</button>
        </form>
        <div id="msg"></div>
    </div>
</div>

<script type="module">
    // ... Yahan aapka purana Firebase code jaisa ka taisa rahega ...
    // Bas upar img src badalna tha jo maine kar diya hai
</script>
</body>
</html>
