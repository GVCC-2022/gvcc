<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Gyan Varsha Coaching Center - Student Login</title>
<link rel="icon" type="image/png" href="20260620_144347.png">
<meta name="description" content="ज्ञान वर्षा कोचिंग सेंटर (GVCC) का स्मार्ट स्टूडेंट पोर्टल। अपने रोल नंबर और पासवर्ड से सुरक्षित लॉगिन करें और अपना डैशबोर्ड देखें।">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
<style>
* { -webkit-touch-callout: none; -webkit-user-select: none; -khtml-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
input, textarea { -webkit-user-select: auto !important; -moz-user-select: auto !important; -ms-user-select: auto !important; user-select: auto !important; }
img { -webkit-user-drag: none; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; overflow: hidden; overscroll-behavior-y: none; touch-action: manipulation; }

@keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(-5vh); } }

.login-container { position: relative; width: 85%; max-width: 400px; display: flex; flex-direction: column; align-items: center; animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
.logo-glow-wrapper { position: relative; width: 100%; height: 180px; display: flex; justify-content: center; align-items: center; margin-bottom: -110px; z-index: 10; }
.logo-glow-wrapper::before { content: ''; position: absolute; width: 190px; height: 190px; margin-top: 25px; margin-left: 10px; border-radius: 50%; background: repeating-conic-gradient(from 0deg, rgba(255, 255, 255, 0.4) 0deg 3deg, transparent 3deg 10deg); -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 70%); mask-image: radial-gradient(circle, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 70%); animation: rotateRays 25s linear infinite; z-index: -1; }
.logo-glow-wrapper::after { content: ''; position: absolute; width: 120px; height: 120px; margin-top: 25px; margin-left: 10px; border-radius: 50%; background: rgba(255, 255, 255, 0.4); filter: blur(20px); z-index: -1; }
@keyframes rotateRays { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.login-logo { width: 250px; height: auto; filter: drop-shadow(0px 8px 15px rgba(0, 0, 0, 0.5)); position: relative; z-index: 5; left: 10px; pointer-events: none; }
.login-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 120px 30px 30px 30px; border-radius: 24px; box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; text-align: center; box-sizing: border-box; position: relative; }
.title { color: #38bdf8; font-size: 26px; font-weight: 800; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 10px; letter-spacing: 1px; }

.install-btn { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 16px; background: linear-gradient(135deg, #0ea5e9, #2563eb) !important; color: white !important; border: none !important; border-radius: 14px !important; font-size: 16px !important; font-weight: bold; cursor: pointer; transition: all 0.3s ease; box-sizing: border-box; margin-bottom: 20px !important; box-shadow: 0 6px 20px rgba(14, 165, 233, 0.3) !important; animation: pulseGlow 2s infinite alternate; }
.install-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(14, 165, 233, 0.5) !important; }
.install-btn:active, .btn-login:active:not(:disabled) { transform: scale(0.95) !important; opacity: 0.8; transition: all 0.1s ease; }
.install-btn i { animation: bounce 2s infinite; font-size: 20px; }

.divider { display: flex; align-items: center; text-align: center; color: #64748b; font-size: 12px; font-weight: 600; margin: 25px 0; }
.divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
.divider:not(:empty)::before { margin-right: .5em; }
.divider:not(:empty)::after { margin-left: .5em; }

input { display: block; width: 100%; padding: 16px; margin: 18px auto; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 14px; font-size: 16px; box-sizing: border-box; transition: all 0.3s ease; background: rgba(255, 255, 255, 0.05); color: white; }
input::placeholder { color: #94a3b8; }
input:focus { border-color: #38bdf8; background: rgba(255, 255, 255, 0.1); box-shadow: 0 0 12px rgba(56, 189, 248, 0.2); outline: none; }

.btn-login { display: flex; align-items: center; justify-content: center; gap: 10px; background: #ffffff; color: #0f172a; padding: 16px; margin: 25px auto 5px auto; width: 100%; border: none; border-radius: 14px; font-size: 18px; font-weight: bold; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1); }
.btn-login:hover:not(:disabled) { background: #f1f5f9; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 255, 255, 0.2); }
.btn-login:disabled { background: rgba(255, 255, 255, 0.2); color: #94a3b8; cursor: not-allowed; box-shadow: none; }

.credit-text { font-size: 11px; color: #64748b; margin-top: 15px; font-weight: 500; letter-spacing: 0.5px; }
.spinner { width: 18px; height: 18px; border: 3px solid rgba(15, 23, 42, 0.3); border-top-color: #0f172a; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-4px);} 60% {transform: translateY(-2px);} }
@keyframes pulseGlow { from { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.4); } to { box-shadow: 0 0 15px 8px rgba(14, 165, 233, 0); } }

#dynamicName { font-size: 14px; color: #4ade80; margin: -10px auto 10px auto; font-weight: 600; width: 100%; text-align: left; height: 18px; opacity: 0; transform: translateY(-5px); transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); padding-left: 5px; }
#dynamicName.show { opacity: 1; transform: translateY(0); }
#msg { font-weight: 600; font-size: 14px; margin-top: 15px; transition: all 0.3s ease; }
</style>
</head>
<body>

<div class="login-container">
    <div class="logo-glow-wrapper"><img src="20260620_144347.png" alt="GVCC Logo" class="login-logo"></div>
    <div class="login-card">
        <div class="title"><i class="fa-solid fa-user-graduate"></i> Student Portal</div>
        
        <button type="button" class="install-btn" onclick="installApp()">
            <i class="fa-solid fa-cloud-arrow-down"></i> Install GVCC App
        </button>

        <div class="divider">SELECT YOUR LOGIN</div>
        <form id="loginForm">
            <input type="number" id="roll" placeholder="Roll Number" required>
            <div id="dynamicName"></div>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="btn-login" id="loginBtn">
                <span class="spinner" id="btnSpinner"></span><span id="btnText">Login</span>
            </button>
        </form>
        
        <div id="msg"></div>
        <div class="credit-text"><i class="fa-solid fa-code-branch"></i> Manage by: GVCC All Members</div>
    </div>
</div>

<script>
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; });
    window.installApp = async function() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') console.log('App Installed!');
            deferredPrompt = null;
        } else {
            alert("📲 App Install Kaise Karein:\n\n1. Apne browser ke upar ya niche 3 dots (⋮) par click karein.\n2. 'Add to Home Screen' ya 'Install App' par click karein.\n3. Bas! Ab app aapke phone me install ho jayegi aur aap login kar payenge.");
        }
    };
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, increment, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";
    import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-messaging.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBJX_dyLK80p2rNqSVvGY67TpWV7e_UdPI",
        authDomain: "gvcc-database.firebaseapp.com",
        projectId: "gvcc-database",
        storageBucket: "gvcc-database.firebasestorage.app",
        messagingSenderId: "1063216875940",
        appId: "1:1063216875940:web:a4ee2f39b01896b44c5931"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const messaging = getMessaging(app);

    // 🌟 SMART NOTIFICATION SYSTEM (Student) 🌟
    const VAPID_KEY = "BCm8eNsThwmymZsqhfaDcHw37fLgNI2qWnr8aLUc0xWSCl0BuhRSkZ0KrYI1D8n0wzK8MY5fybOgMVWoXAR97VM";

    setTimeout(async () => {
        if ("Notification" in window && Notification.permission === "default") {
            try {
                const permission = await Notification.requestPermission();
                if (permission === "granted") {
                    console.log("🔔 Notification Permission Granted!");
                    const token = await getToken(messaging, { vapidKey: VAPID_KEY });
                    if (token) {
                        await addDoc(collection(db, "notification_tokens"), {
                            token: token,
                            userType: "Student",
                            timestamp: serverTimestamp()
                        });
                        console.log("✅ Device Token Saved!");
                    }
                }
            } catch (error) { console.log("⚠️ Notification Setup Error:", error); }
        }
    }, 2000);

    // App Download Tracker
    window.addEventListener('appinstalled', async () => {
        try {
            const statsRef = doc(db, "admin_stats", "app_downloads");
            await setDoc(statsRef, { total_downloads: increment(1), last_installed_at: new Date().toLocaleString("en-IN", { timeZone: "Asia/Kolkata" }) }, { merge: true });
        } catch (e) { console.error("Error updating count:", e); }
    });

    const rollInput = document.getElementById("roll");
    const nameDiv = document.getElementById("dynamicName");

    rollInput.addEventListener("input", async function() {
        let roll = this.value.trim();
        if (roll.length >= 3) { 
            try {
                const docSnap = await getDoc(doc(db, "students", roll));
                if (docSnap.exists()) {
                    let data = docSnap.data();
                    nameDiv.innerText = `👤 ${data["Name "] || data.Name || "Unknown Student"}`;
                    nameDiv.classList.add("show");
                } else { nameDiv.classList.remove("show"); }
            } catch (error) { console.error("Live fetch error:", error); }
        } else { nameDiv.classList.remove("show"); }
    });

    // 🚀 SMART OVERWRITE LOGIC 🚀
    async function saveLoginLog(rollNumber, studentName) {
        try {
            const now = new Date();
            // Sirf date nikal rahe hain ID ke liye (jaise: 16-7-2026)
            const formattedDate = now.toLocaleDateString("en-IN", { timeZone: "Asia/Kolkata" }).replace(/\//g, "-");
            
            // Document ID ab sirf "RollNumber_Date" hogi (Time hata diya)
            const docId = `${rollNumber}_${formattedDate}`; 
            
            await setDoc(doc(db, "login_logs", docId), {
                roll: rollNumber, 
                name: studentName, 
                date: formattedDate,
                lastLoginTime: now.toLocaleTimeString("en-IN", { timeZone: "Asia/Kolkata" }), // Sirf aakhri login ka time update hoga
                loginCount: increment(1), // Har login par count +1 ho jayega
                timestamp: serverTimestamp()
            }, { merge: true }); // 'merge: true' ensures purana data delete nahi hoga
        } catch (error) { console.error("Error saving log:", error); }
    }

    document.getElementById("loginForm").addEventListener("submit", async function(e) {
        e.preventDefault(); 
        const loginBtn = document.getElementById("loginBtn"), btnSpinner = document.getElementById("btnSpinner"), btnText = document.getElementById("btnText"), msg = document.getElementById("msg");
        let roll = rollInput.value.trim(), password = document.getElementById("password").value.trim();

        loginBtn.disabled = true; btnSpinner.style.display = "block"; btnText.innerText = "Checking...";
        msg.style.color = "#fbbf24"; msg.innerHTML = "🔄 Verifying...";

        try {
            const docSnap = await getDoc(doc(db, "students", roll));
            if (docSnap.exists()) {
                let data = docSnap.data();
                if (String(data["Password "] || data.Password || data["password "]).trim() === String(password).trim()) {
                    
                    if ("Notification" in window && Notification.permission === "granted") {
                        try {
                            const token = await getToken(messaging, { vapidKey: VAPID_KEY });
                            if (token) {
                                await setDoc(doc(db, "students", roll), {
                                    notificationToken: token,
                                    class: data.class 
                                }, { merge: true });
                                console.log("✅ Student Token Updated in DB!");
                            }
                        } catch (err) { console.log("Token error:", err); }
                    }

                    msg.style.color = "#4ade80"; msg.innerHTML = "✅ Login Successful!";
                    localStorage.setItem("studentRoll", roll);
                    localStorage.setItem("studentClass", data.class); 
                    
                    // Call new Smart Login Log function
                    await saveLoginLog(roll, data["Name "] || data.Name || "Unknown Student");
                    
                    msg.innerHTML = "🚀 Redirecting...";
                    setTimeout(() => { window.location.href = "dashboard.html"; }, 1200);
                } else { msg.style.color = "#f87171"; msg.innerHTML = "❌ Wrong Password"; resetButton(); }
            } else { msg.style.color = "#f87171"; msg.innerHTML = "❌ Roll Number Not Found"; resetButton(); }
        } catch (error) { msg.style.color = "#f87171"; msg.innerHTML = "⚠️ Network error."; resetButton(); }

        function resetButton() { loginBtn.disabled = false; btnSpinner.style.display = "none"; btnText.innerText = "Login"; }
    });

</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("/service-worker.js", { scope: "/" }).catch(function(error) { console.log("PWA Error:", error); });
  });
}
</script>
</body>
</html>
