<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GVCC Student Portal</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
text-align:center;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
max-width:350px;
margin:auto;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin:10px 0;
}

button{
background:#007bff;
color:white;
padding:12px;
border:none;
border-radius:8px;
width:95%;
}

h1{
color:#003366;
}

</style>

</head>

<body>

<div class="box">

<h1>🎓 Student Portal</h1>

<input type="text"
id="roll"
placeholder="Roll Number">

<input type="password"
id="password"
placeholder="Password">

<button>
Login
</button>

<p id="msg"></p>

</div>

</body>
</html>
