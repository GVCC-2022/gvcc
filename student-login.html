<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GVCC Student Portal</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f9;
text-align:center;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
max-width:350px;
margin:auto;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin:10px 0;
}

button{
background:#007bff;
color:white;
padding:12px;
border:none;
border-radius:8px;
width:95%;
cursor:pointer;
}

h1{
color:#003366;
}

#msg{
margin-top:10px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="box">

<h1>🎓 Student Portal</h1>

<input type="text"
id="roll"
placeholder="Roll Number">

<input type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

<p id="msg"></p>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBJX_dyLK80p2rNqSVvGY67TpWV7e_UdPI",
authDomain: "gvcc-database.firebaseapp.com",
projectId: "gvcc-database",
storageBucket: "gvcc-database.firebasestorage.app",
messagingSenderId: "1063216875940",
appId: "1:1063216875940:web:a4ee2f39b01896b44c5931"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.login = async function(){

let roll =
document.getElementById("roll").value;

let password =
document.getElementById("password").value;

const docRef =
doc(db,"students",roll);

const docSnap =
await getDoc(docRef);

if(docSnap.exists()){

let data =
docSnap.data();

console.log("Firestore Data:", data);
console.log("Firestore Password:", data.Password);
console.log("Entered Password:", password);
if(data.Password == password){

localStorage.setItem(
"studentRoll",
roll
);

window.location.href =
"dashboard.html";

}else{
document.getElementById("msg").innerHTML =
data.Password + " | " + password;

document.getElementById("msg").innerHTML =
"❌ Wrong Password";

}

}else{

document.getElementById("msg").innerHTML =
"❌ Roll Number Not Found";

}

}

</script>

</body>
</html>
