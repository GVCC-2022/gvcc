<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVCC - Photo Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #003366;
            --bg: #f8fafc;
            --text-main: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 🌟 Cinematic Welcome Screen */
        #welcome-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f172a, #003366);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .welcome-icon {
            font-size: 50px;
            margin-bottom: 20px;
            color: #fbcfe8;
            animation: float 2s ease-in-out infinite;
        }

        .welcome-text {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            padding: 0 20px;
            background: linear-gradient(90deg, #fbcfe8, #c026d3, #fbcfe8);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 2s linear infinite, popup 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes popup {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes shine { to { background-position: 200% center; } }

        /* 🌟 Premium Header */
        header {
            background: linear-gradient(135deg, #002244 0%, #003366 100%);
            color: white;
            padding: 20px 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            color: white;
            font-size: 20px;
            text-decoration: none;
            margin-right: 15px;
            padding: 5px 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
        }

        header h1 { margin: 0; font-size: 20px; flex: 1; }

        /* 📸 Photo Gallery Grid */
        .gallery-container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            flex: 1;
        }

        .gallery-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            aspect-ratio: 1 / 1; 
        }

        .gallery-item:active { transform: scale(0.95); }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img { transform: scale(1.1); }

        /* 🖼️ Full Screen Modal (Lightbox) */
        #myModal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
        }

        #modalImg {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 80vh;
            margin-top: 10vh;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            animation: zoomIn 0.3s ease;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #f1f1f1;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 40px;
            height: 40px;
            text-align: center;
            line-height: 40px;
            border-radius: 50%;
        }

        @keyframes zoomIn {
            from {transform: scale(0.8); opacity: 0;}
            to {transform: scale(1); opacity: 1;}
        }

        footer {
            background: #001529;
            color: #94a3b8;
            text-align: center;
            padding: 15px;
            font-size: 12px;
            margin-top: auto;
        }
    </style>
</head>
<body>

    <!-- ✨ The Cinematic Welcome Screen ✨ -->
    <div id="welcome-screen">
        <i class="fa-solid fa-photo-film welcome-icon"></i>
        <div class="welcome-text">✨ यादों के सफ़र में<br>आपका स्वागत हैं... ✨</div>
    </div>

    <header>
        <a href="dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <h1><i class="fa-solid fa-images"></i> GVCC Gallery</h1>
    </header>

    <div class="gallery-container">
        <!-- 📷 यहाँ से आपकी फोटोज़ शुरू होंगी -->
        <div class="gallery-item" onclick="openModal(this)">
            <img src="20260620_144347.png" alt="GVCC Event">
        </div>
        
        <div class="gallery-item" onclick="openModal(this)">
            <img src="https://images.unsplash.com/photo-1577896851231-70ef18881754?w=500&auto=format&fit=crop" alt="Students Study">
        </div>

        <div class="gallery-item" onclick="openModal(this)">
            <img src="https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=500&auto=format&fit=crop" alt="Topper Award">
        </div>

        <div class="gallery-item" onclick="openModal(this)">
            <img src="https://images.unsplash.com/photo-1509062522246-3755977927d7?w=500&auto=format&fit=crop" alt="Classroom">
        </div>
        
        <div class="gallery-item" onclick="openModal(this)">
            <img src="https://images.unsplash.com/photo-1427504494785-3a9ca7044f45?w=500&auto=format&fit=crop" alt="Event">
        </div>
    </div>

    <!-- The Full Screen Modal -->
    <div id="myModal">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <img id="modalImg" src="">
    </div>

    <footer>
        <p>© Gyan Varsha Coaching Center</p>
    </footer>

    <script>
        // Welcome Screen Fade Out Logic
        window.addEventListener('load', function() {
            setTimeout(function() {
                const welcomeScreen = document.getElementById('welcome-screen');
                welcomeScreen.style.opacity = '0';
                welcomeScreen.style.visibility = 'hidden';
            }, 2500); // 2.5 सेकंड तक एनीमेशन दिखेगा
        });

        // Modal Logic
        const modal = document.getElementById("myModal");
        const modalImg = document.getElementById("modalImg");

        function openModal(element) {
            const img = element.querySelector("img");
            modal.style.display = "block";
            modalImg.src = img.src;
        }

        function closeModal() {
            modal.style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
