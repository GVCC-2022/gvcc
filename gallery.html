<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVCC - Photo Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #003366; --bg: #f8fafc; --text-main: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }

        /* ✨ PRO Cinematic Welcome Screen ✨ */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #2a0845 0%, #001529 100%);
            z-index: 99999; display: flex; align-items: center; justify-content: center;
            flex-direction: column; color: white;
            transition: opacity 1s ease, visibility 1s ease, filter 1s ease;
        }

        .welcome-hidden { opacity: 0; visibility: hidden; filter: blur(10px); }

        .welcome-icon { font-size: 55px; margin-bottom: 25px; color: #fda4af; animation: float 3s ease-in-out infinite; }
        .welcome-text { font-size: 26px; font-weight: 700; text-align: center; padding: 0 20px; line-height: 1.4;
            background: linear-gradient(90deg, #ffe4e6, #f43f5e, #ffe4e6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite; }

        .petal { position: absolute; top: -10%; border-radius: 15px 0 15px 0; opacity: 0; animation: fall linear forwards; z-index: 999999; }

        @keyframes fall { 
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.9; }
            80% { opacity: 0.9; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } 
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes shine { to { background-position: 200% center; } }

        /* 📸 Gallery Styles */
        header { background: linear-gradient(135deg, #002244 0%, #003366 100%); color: white; padding: 20px 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; }
        .back-btn { color: white; font-size: 20px; text-decoration: none; margin-right: 15px; padding: 5px 10px; background: rgba(255,255,255,0.1); border-radius: 8px; }
        header h1 { margin: 0; font-size: 20px; flex: 1; }
        .gallery-container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; flex: 1; }
        .gallery-item { position: relative; border-radius: 12px; overflow: hidden; aspect-ratio: 1 / 1; cursor: pointer; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .gallery-item:hover img { transform: scale(1.1); }
        
        /* Modal */
        #myModal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        #modalImg { margin: auto; display: block; max-width: 90%; max-height: 80vh; margin-top: 10vh; border-radius: 10px; }
    </style>
</head>
<body>

    <audio id="bgSong">
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <div id="welcome-screen">
        <i class="fa-solid fa-photo-film welcome-icon"></i>
        <div class="welcome-text">✨ यादों के सफ़र में<br>आपका स्वागत हैं... ✨</div>
    </div>

    <header>
        <a href="dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <h1><i class="fa-solid fa-images"></i> GVCC Gallery</h1>
    </header>

    <!-- 🚀 स्मार्ट गैलरी का डिब्बा (खाली रखा है, क्योंकि जावास्क्रिप्ट इसे भरेगा) -->
    <div class="gallery-container" id="myGalleryBox"></div>

    <div id="myModal"><span class="close-modal" onclick="closeModal()" style="position:absolute; top:20px; right:30px; color:white; font-size:40px; cursor:pointer;">&times;</span><img id="modalImg"></div>

    <script>
        // ==========================================
        // 📸 यहाँ अपनी फ़ोटोज़ के नाम डालिए
        // ==========================================
        const myPhotos = [
            "20260620_144347.png",           // आपकी मेन फोटो
            "15august/IMG_20260126_161908211_HDR.jpg",           // 15 अगस्त फोल्डर की फोटो
            "15august/15august/20260705_063454.jpg"            // (इन नामों को अपनी अपलोड की गई फोटो के नाम से बदल लें)
        ];

        // यह कोड अपने-आप सभी फोटो को सजा देगा
        const galleryBox = document.getElementById("myGalleryBox");
        myPhotos.forEach(photo => {
            galleryBox.innerHTML += `
                <div class="gallery-item" onclick="openModal(this)">
                    <img src="${photo}" alt="GVCC Photo" loading="lazy">
                </div>
            `;
        });
        // ==========================================

        const song = document.getElementById('bgSong');
        const welcome = document.getElementById('welcome-screen');

        function createPetals() {
            const colors = [['#e11d48', '#be123c'], ['#f59e0b', '#d97706'], ['#fde047', '#eab308'], ['#ffffff', '#e2e8f0'], ['#f472b6', '#db2777']];
            for (let i = 0; i < 100; i++) {
                let petal = document.createElement('div');
                petal.classList.add('petal');
                let randomColor = colors[Math.floor(Math.random() * colors.length)];
                petal.style.background = `linear-gradient(135deg, ${randomColor[0]}, ${randomColor[1]})`;
                let size = Math.random() * 15 + 10;
                petal.style.width = size + 'px'; 
                petal.style.height = size + 'px';
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.animationDuration = (Math.random() * 2 + 2) + 's';
                petal.style.animationDelay = Math.random() * 2 + 's';
                welcome.appendChild(petal);
            }
        }

        window.addEventListener('load', () => {
            createPetals();

            // ⏱️ टाइमिंग फिक्स: अब यह ठीक 5.25 सेकंड (5250ms) तक इंतज़ार करेगा, फिर गायब होना शुरू होगा
            setTimeout(() => { 
                welcome.classList.add('welcome-hidden');
                setTimeout(() => { welcome.style.display = 'none'; }, 1000); 
            }, 5250); 

            let playPromise = song.play();
            if (playPromise !== undefined) {
                playPromise.catch(() => {
                    window.addEventListener('touchstart', () => { song.play(); }, { once: true });
                    window.addEventListener('click', () => { song.play(); }, { once: true });
                });
            }
        });

        function openModal(el) { document.getElementById("myModal").style.display = "block"; document.getElementById("modalImg").src = el.querySelector("img").src; }
        function closeModal() { document.getElementById("myModal").style.display = "none"; }
    </script>
</body>
</html>
