<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVCC - Photo Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #003366;
            --bg: #f8fafc;
            --text-main: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ✨ PRO Cinematic Welcome Screen ✨ */
        #welcome-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* एक बहुत ही रॉयल और डार्क रोमांटिक बैकग्राउंड */
            background: radial-gradient(circle, #2a0845 0%, #001529 100%);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            /* बहुत ही स्मूद तरीके से गायब होने का इफ़ेक्ट */
            transition: opacity 1.5s ease, visibility 1.5s ease, filter 1.5s ease, transform 1.5s ease;
            overflow: hidden;
        }

        /* गायब होते समय का इफ़ेक्ट (Fade + Blur + Zoom out) */
        .welcome-hidden {
            opacity: 0;
            visibility: hidden;
            filter: blur(10px);
            transform: scale(1.1);
        }

        .welcome-icon {
            font-size: 55px;
            margin-bottom: 25px;
            color: #fda4af;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(253, 164, 175, 0.5));
        }

        .welcome-text {
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            padding: 0 20px;
            line-height: 1.4;
            background: linear-gradient(90deg, #ffe4e6, #f43f5e, #ffe4e6);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            animation: smoothReveal 1.5s forwards 0.5s, shine 3s linear infinite;
        }

        /* 🌹 Falling Rose Petals CSS 🌹 */
        .petal {
            position: absolute;
            top: -10%;
            background: linear-gradient(135deg, #e11d48, #be123c);
            /* यह कोड एक चौकोर डिब्बे को गुलाब की पंखुड़ी का आकार देता है */
            border-radius: 15px 0 15px 0;
            opacity: 0.8;
            box-shadow: 0 0 10px rgba(225, 29, 72, 0.5);
            animation: fall linear forwards;
            z-index: 999999;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg) translateX(50px); opacity: 0; }
        }

        @keyframes smoothReveal {
            0% { transform: translateY(20px); opacity: 0; filter: blur(5px); }
            100% { transform: translateY(0); opacity: 1; filter: blur(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.05); }
        }

        @keyframes shine { to { background-position: 200% center; } }

        /* 🌟 Premium Header */
        header {
            background: linear-gradient(135deg, #002244 0%, #003366 100%);
            color: white;
            padding: 20px 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn { color: white; font-size: 20px; text-decoration: none; margin-right: 15px; padding: 5px 10px; background: rgba(255,255,255,0.1); border-radius: 8px; }
        header h1 { margin: 0; font-size: 20px; flex: 1; }

        /* 📸 Photo Gallery Grid */
        .gallery-container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; flex: 1; }
        .gallery-item { position: relative; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.3s ease, box-shadow 0.3s ease; aspect-ratio: 1 / 1; }
        .gallery-item:active { transform: scale(0.95); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .gallery-item:hover img { transform: scale(1.1); }

        /* 🖼️ Full Screen Modal (Lightbox) */
        #myModal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.9); backdrop-filter: blur(5px); }
        #modalImg { margin: auto; display: block; max-width: 90%; max-height: 80vh; margin-top: 10vh; border-radius: 10px; box-shadow: 0 0 20px rgba(255,255,255,0.2); animation: zoomIn 0.3s ease; }
        .close-modal { position: absolute; top: 20px; right: 30px; color: #f1f1f1; font-size: 35px; font-weight: bold; cursor: pointer; background: rgba(0,0,0,0.5); width: 40px; height: 40px; text-align: center; line-height: 40px; border-radius: 50%; }
        @keyframes zoomIn { from {transform: scale(0.8); opacity: 0;} to {transform: scale(1); opacity: 1;} }
        
        footer { background: #001529; color: #94a3b8; text-align: center; padding: 15px; font-size: 12px; margin-top: auto; }
    </style>
</head>
<body>

    <!-- ✨ PRO Cinematic Welcome Screen with Roses ✨ -->
    <div id="welcome-screen">
        <i class="fa-solid fa-photo-film welcome-icon"></i>
        <div class="welcome-text">✨ यादों के सफ़र में<br>आपका स्वागत हैं... ✨</div>
    </div>

    <header>
        <a href="dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <h1><i class="fa-solid fa-images"></i> GVCC Gallery</h1>
    </header>

    <div class="gallery-container">
        <div class="gallery-item" onclick="openModal(this)"><img src="20260620_144347.png" alt="GVCC Event"></div>
        <div class="gallery-item" onclick="openModal(this)"><img src="https://images.unsplash.com/photo-1577896851231-70ef18881754?w=500&auto=format&fit=crop" alt="Students Study"></div>
        <div class="gallery-item" onclick="openModal(this)"><img src="https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=500&auto=format&fit=crop" alt="Topper Award"></div>
        <div class="gallery-item" onclick="openModal(this)"><img src="https://images.unsplash.com/photo-1509062522246-3755977927d7?w=500&auto=format&fit=crop" alt="Classroom"></div>
        <div class="gallery-item" onclick="openModal(this)"><img src="https://images.unsplash.com/photo-1427504494785-3a9ca7044f45?w=500&auto=format&fit=crop" alt="Event"></div>
    </div>

    <!-- The Full Screen Modal -->
    <div id="myModal">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <img id="modalImg" src="">
    </div>

    <footer>
        <p>© Gyan Varsha Coaching Center</p>
    </footer>

    <script>
        // 🌹 JavaScript for Falling Rose Petals 🌹
        function createPetals() {
            const welcomeScreen = document.getElementById('welcome-screen');
            const petalCount = 35; // पंखुड़ियों की संख्या
            
            for (let i = 0; i < petalCount; i++) {
                let petal = document.createElement('div');
                petal.classList.add('petal');
                
                // पंखुड़ियों का साइज़, जगह और गिरने की स्पीड रैंडम (अलग-अलग) कर दी है
                let size = Math.random() * 15 + 10; 
                petal.style.width = size + 'px';
                petal.style.height = size + 'px';
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.animationDuration = (Math.random() * 3 + 2) + 's'; 
                petal.style.animationDelay = Math.random() * 2 + 's';
                
                welcomeScreen.appendChild(petal);
            }
        }

        window.addEventListener('load', function() {
            // पेज लोड होते ही पंखुड़ियां गिरना शुरू होंगी
            createPetals();

            // 3.5 सेकंड बाद वेलकम स्क्रीन बहुत ही स्मूद तरीके से गायब हो जाएगी
            setTimeout(function() {
                const welcomeScreen = document.getElementById('welcome-screen');
                welcomeScreen.classList.add('welcome-hidden');
                
                // एनीमेशन खत्म होने के बाद उसे HTML से हटा दें ताकि पीछे गैलरी क्लिक हो सके
                setTimeout(() => { welcomeScreen.style.display = 'none'; }, 1500);
            }, 3500); 
        });

        // Modal Logic
        const modal = document.getElementById("myModal");
        const modalImg = document.getElementById("modalImg");

        function openModal(element) {
            const img = element.querySelector("img");
            modal.style.display = "block";
            modalImg.src = img.src;
        }

        function closeModal() { modal.style.display = "none"; }
        window.onclick = function(event) { if (event.target == modal) { closeModal(); } }
    </script>
</body>
</html>
